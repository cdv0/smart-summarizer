<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Summarizer</title>
    <link rel="stylesheet" href="popup.css"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
    <!-- HOME VIEW -->
    <div id="home-view">
        <!-- HEADER -->
        <div id="header" class="header">
            <div class="logo-title">
                <img id="header-icon" src="icon.png" alt="Smart Summarizer icon" />
                <h1 id="header-title">Summarize</h1>
            </div>

            <div id="status">
                <button id="status-dot"></button>
                <p id="status-text">Active</p>
            </div>
        </div>

        <!-- CURRENT PAGE SECTION-->
        <div id="current-page-container">
            <div id="current-page">
                <p class="label-gray">Current page</p>
                <p id="current-page-title" class="text-normal">TESTING REMOVE LATER</p>
            </div>
        </div>

        <div id="main-content">

            <button id="btn-summarize-page" class="btn-summarize">
                <div class="logo-title">
                    <img id="summarize-page-icon" class="summarize-btn-icon" src="write.png" alt="Write notes icon" />
                    <div class="summarize-btn-text">
                        <p class="label-bold">Summarize page</p>
                        <p class="subtext">Get a quick overview of the page</p>
                    </div>
                </div>
                <span class="material-symbols-rounded icon-chevron-right">chevron_right</span>
            </button>

            <button id="btn-summarize-content" class="btn-summarize">
                <div class="logo-title">
                    <img id="summarize-content-icon" class="summarize-btn-icon" src="align-left.png" alt="Align left icon" />
                    <div class="summarize-btn-text">
                        <p class="label-bold">Summarize content</p>
                        <p class="subtext">Extract key sections</p>
                    </div>
                </div>
                <span class="material-symbols-rounded icon-chevron-right">chevron_right</span>
            </button>

            <div id="result-container" class="hidden">
                <div id="result-header">
                    <p id="result-label" class="result-text">Content summary</p>
                    <button id="btn-copy" class="btn-label">Copy</button>
                </div>
                <p id="result-body">TESTING REMOVE LATER</p>
            </div>
        </div>

        <div id="length-selector">
            <p id="length-label">Length</p>
            <div id="length-options">
                <button id="btn-length-short" class="length-btn">Short</button>
                <button id="btn-length-medium" class="length-btn">Medium</button>
                <button id="btn-length-detailed" class="length-btn">Detailed</button>
            </div>
        </div>

        <!-- SETTINGS VIEW -->
    <div id="settings-view">
        <!-- HEADER -->
        <div id="header-settings" class="header">
            <div class="left-side-header">
                <button id="btn-back-settings" class="btn-back">
                    <span class="material-symbols-rounded icon-chevron-left">chevron_left</span>
                </button>
                
                <div class="logo-title">
                    <div class="background-icon" id="settings-icon">
                        <span class="material-symbols-outlined icon">clear_day</span>
                    </div>
                    <h1 id="header-title">Settings</h1>
                </div>
            </div>
        </div>

        <!-- SETTINGS CONTENT-->
        <div id="settings-content">
            <!-- SUMMARIZATION SECTION -->
            <section id="settings-summarization">
                <p class="text-gray-small semibold settings-section-title">SUMMARIZATION</p>

                <!-- DEFAULT LENGTH-->
                <div id="settings-default-length" class="settings-item">
                    <div class="settings-left">
                        <label class="settings-item-title" for="default-length">Default length</label>
                        <p class="settings-item-subtext">Summary length when opened</p>
                    </div>
                    <div class="settings-right">
                        <select name="default-length" id="default-length" class="dropdown">
                            <option value="short">Short</option>
                            <option value="medium">Medium</option>
                            <option value="detailed">Detailed</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- HISTORY SECTION -->
            <section id="settings-history">
            <p class="text-gray-small semibold settings-section-title">HISTORY</p>

            <!-- SAVE HISTORY -->
            <div id="settings-save-history" class="settings-item">
                <div class="settings-left">
                    <label class="settings-item-title" for="save-history">Save history</label>
                    <p class="settings-item-subtext">Store past summaries</p>
                </div>
                <div class="settings-right">
                    <label class="switch">
                    <input type="checkbox" id="save-history">
                    <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <!-- KEEP HISTORY FOR -->
            <div id="settings-keep-history-for" class="settings-item">
                <div class="settings-left">
                    <label class="settings-item-title" for="keep-history-for">Keep history for</label>
                    <p class="settings-item-subtext">Auto-delete after this period</p>
                </div>
                <div class="settings-right">
                    <select name="keep-history-for" id="keep-history-for" class="dropdown">
                        <option value="seven">7 days</option>
                        <option value="fourteen">14 days</option>
                        <option value="thirty">30 days</option>
                        <option value="forever">Forever</option>
                    </select>
                </div>
            </div>
            </section>

            <!-- ABOUT SECTION -->
            <section id="settings-about">
            <p class="text-gray-small semibold settings-section-title">ABOUT</p>

            <!-- VERSION -->
            <div id="settings-version">
                <div class="settings-left">
                    <p class="">Version</p>
                </div>
                <div class="settings-right">
                    <p id="version-text"></p>
                </div>
            </div>

            <!-- CLEAR ALL DATA BUTTON -->
                <button class="btn-danger-outline">Clear all data</button>
            </section>
        </div>

        <div id="footer">
            <p id="footer-brand" class="text-gray-small">Smart Summarizer</p>
            <div id="footer-links">
                <button id="btn-history" class="btn-label">History</button>
                <button id="btn-settings" class="btn-label">Settings</button>
            </div>
        </div>
    </div>

<script src="popup.js"></script>
</body>
</html>
